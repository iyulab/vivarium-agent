name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      # Pre-publish stopgap: @vivarium/changeset is a file: dependency on a
      # sibling checkout (../vivarium-changeset). Once the SDK is published,
      # replace this double checkout with a normal semver dependency.
      - uses: actions/checkout@v4
        with:
          path: vivarium-agent
      - uses: actions/checkout@v4
        with:
          repository: iyulab/vivarium-changeset
          path: vivarium-changeset
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm install
        working-directory: vivarium-agent
      - run: npm test
        working-directory: vivarium-agent
