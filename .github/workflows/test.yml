name: test

on:
  push:
    branches: [main]
  pull_request:

# Supersede in-flight runs of the same branch: on a PR only the newest push is
# worth checking. main is exempt — each commit there is a release gate, and a
# cancelled run leaves that commit with no verdict.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
      - run: npm test
      # Type-check + dist build — exports point at dist/, so the consumer
      # smoke below needs it built (folder installs don't run prepack).
      - run: npm run build
      # Consumer-contact smoke (Phase 5.a): a fresh consumer package installs
      # this repo and imports the public surface. @vivariumjs/changeset comes
      # from the registry, so this is a true standalone consumption check.
      - name: Fresh consumer installs and imports @vivariumjs/agent
        run: |
          mkdir "$RUNNER_TEMP/consumer" && cd "$RUNNER_TEMP/consumer"
          echo '{"name":"consumer","private":true,"type":"module"}' > package.json
          npm install --no-audit --no-fund "$GITHUB_WORKSPACE"
          node -e "import('@vivariumjs/agent').then((m) => { const n = Object.keys(m).length; if (!n) throw new Error('empty surface'); console.log('imported', n, 'exports'); }).catch((e) => { console.error(e); process.exit(1); })"
      # Docs-example verification (Phase 5.c): the getting-started fences are
      # extracted, type-checked, and executed against the packed tarball.
      - name: Getting-started examples run as a fresh npm consumer
        run: node tools/verify-docs-examples.ts
